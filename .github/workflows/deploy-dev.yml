name: CD Dev

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      FOUNDATION_STACK_NAME: alochat-dev-foundation
      RUNTIME_STACK_NAME: alo-dev-runtime
      CLUSTER_NAME: alo-dev-cluster
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Validate deploy variables
        run: |
          if [ -z "${AWS_REGION}" ] || [ -z "${AWS_ROLE_ARN}" ]; then
            echo "Missing dev environment vars: AWS_REGION or AWS_ROLE_ARN"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Build and push service images
        run: bash local/build-and-push-ecr.sh "$IMAGE_TAG"

      - name: Build and push MSK admin image
        run: bash local/build-and-push-msk-admin.sh "$IMAGE_TAG"

      - name: Update runtime image parameters
        run: python3 local/update-runtime-image-tags.py "$IMAGE_TAG"

      - name: Validate runtime template
        run: aws cloudformation validate-template --region "$AWS_REGION" --template-body file://infra/runtime.yaml

      - name: Deploy runtime
        run: |
          aws cloudformation deploy \
            --region "$AWS_REGION" \
            --stack-name "$RUNTIME_STACK_NAME" \
            --template-file infra/runtime.yaml \
            --parameter-overrides file://infra/parameters/dev/runtime.json \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Validate poison message to DLQ
        continue-on-error: true
        run: bash local/validate-dlq.sh

      - name: Warn if DLQ validation failed
        if: failure()
        run: |
          echo "DLQ validation failed after deploy."
          echo "The runtime deploy may still be healthy; review the validate-dlq step logs separately."
