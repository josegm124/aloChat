name: CD Dev

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Define image tags
        id: image-vars
        run: |
          echo "sha_tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "inbound_image=${ECR_REGISTRY}/alochat/dev/inbound-adapter:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "processor_image=${ECR_REGISTRY}/alochat/dev/processor:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "ai_image=${ECR_REGISTRY}/alochat/dev/ai-orchestrator:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "outbound_image=${ECR_REGISTRY}/alochat/dev/outbound-dispatcher:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Build and push inbound-adapter image
        run: ./gradlew :services:inbound-adapter:jib -Djib.to.image=${{ steps.image-vars.outputs.inbound_image }}

      - name: Build and push processor image
        run: ./gradlew :services:processor:jib -Djib.to.image=${{ steps.image-vars.outputs.processor_image }}

      - name: Build and push ai-orchestrator image
        run: ./gradlew :services:ai-orchestrator:jib -Djib.to.image=${{ steps.image-vars.outputs.ai_image }}

      - name: Build and push outbound-dispatcher image
        run: ./gradlew :services:outbound-dispatcher:jib -Djib.to.image=${{ steps.image-vars.outputs.outbound_image }}

      - name: Deploy runtime stack to dev
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then
            echo "Missing dev environment secret: TELEGRAM_BOT_TOKEN"
            exit 1
          fi

          mapfile -t base_params < <(
            jq -r '
              .[]
              | select(
                  .ParameterKey != "InboundAdapterImageUri"
                  and .ParameterKey != "ProcessorImageUri"
                  and .ParameterKey != "AiOrchestratorImageUri"
                  and .ParameterKey != "OutboundDispatcherImageUri"
                  and .ParameterKey != "TelegramBotToken"
                )
              | "\(.ParameterKey)=\(.ParameterValue)"
            ' infra/parameters/dev/runtime.json
          )

          aws cloudformation deploy \
            --region "${AWS_REGION}" \
            --stack-name alochat-dev-runtime \
            --template-file infra/runtime.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
            "${base_params[@]}" \
            "InboundAdapterImageUri=${{ steps.image-vars.outputs.inbound_image }}" \
            "ProcessorImageUri=${{ steps.image-vars.outputs.processor_image }}" \
            "AiOrchestratorImageUri=${{ steps.image-vars.outputs.ai_image }}" \
            "OutboundDispatcherImageUri=${{ steps.image-vars.outputs.outbound_image }}" \
            "TelegramBotToken=${TELEGRAM_BOT_TOKEN}"

      - name: Wait for ECS services to become stable
        run: |
          cluster_name=$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name alochat-dev-runtime \
            --query 'Stacks[0].Outputs[?OutputKey==`ClusterName`].OutputValue' \
            --output text)

          inbound_service=$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name alochat-dev-runtime \
            --query 'Stacks[0].Outputs[?OutputKey==`InboundServiceName`].OutputValue' \
            --output text)

          processor_service=$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name alochat-dev-runtime \
            --query 'Stacks[0].Outputs[?OutputKey==`ProcessorServiceName`].OutputValue' \
            --output text)

          ai_service=$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name alochat-dev-runtime \
            --query 'Stacks[0].Outputs[?OutputKey==`AiServiceName`].OutputValue' \
            --output text)

          outbound_service=$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name alochat-dev-runtime \
            --query 'Stacks[0].Outputs[?OutputKey==`OutboundServiceName`].OutputValue' \
            --output text)

          aws ecs wait services-stable \
            --region "${AWS_REGION}" \
            --cluster "${cluster_name}" \
            --services "${inbound_service}" "${processor_service}" "${ai_service}" "${outbound_service}"

      - name: Print runtime endpoint
        run: |
          http_api_url=$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name alochat-dev-runtime \
            --query 'Stacks[0].Outputs[?OutputKey==`HttpApiUrl`].OutputValue' \
            --output text)

          echo "Runtime deployed to: ${http_api_url}"
