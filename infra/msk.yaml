AWSTemplateFormatVersion: '2010-09-09'
Description: alo Kafka stack - low-cost MSK cluster for async assessment processing

Parameters:
  ProjectName:
    Type: String
    Default: alo
  EnvironmentName:
    Type: String
    Default: dev
  FoundationStackName:
    Type: String
  KafkaVersion:
    Type: String
    Default: 3.6.0
  BrokerNodeCount:
    Type: Number
    Default: 2
  BrokerInstanceType:
    Type: String
    Default: kafka.t3.small
  BrokerVolumeSize:
    Type: Number
    Default: 100

Resources:
  Cluster:
    Type: AWS::MSK::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-${EnvironmentName}-msk
      KafkaVersion: !Ref KafkaVersion
      NumberOfBrokerNodes: !Ref BrokerNodeCount
      EnhancedMonitoring: DEFAULT
      BrokerNodeGroupInfo:
        ClientSubnets: !Split
          - ","
          - !ImportValue
            Fn::Sub: ${FoundationStackName}-PrivateSubnetIds
        InstanceType: !Ref BrokerInstanceType
        SecurityGroups:
          - !ImportValue
            Fn::Sub: ${FoundationStackName}-KafkaClientSecurityGroupId
        StorageInfo:
          EBSStorageInfo:
            VolumeSize: !Ref BrokerVolumeSize
      ClientAuthentication:
        Unauthenticated:
          Enabled: true
      EncryptionInfo:
        EncryptionInTransit:
          ClientBroker: TLS_PLAINTEXT
          InCluster: true
      Tags:
        Name: !Sub ${ProjectName}-${EnvironmentName}-msk

Outputs:
  ClusterArn:
    Value: !Ref Cluster
    Export:
      Name: !Sub ${AWS::StackName}-ClusterArn
