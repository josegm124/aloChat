      ServiceName: alo-intake-service
      Cluster: !Ref Cluster
      DesiredCount: !Ref ServiceDesiredCount
      EnableExecuteCommand: true
      LaunchType: FARGATE
      PlatformVersion: LATEST
      TaskDefinition: !Ref IntakeTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !ImportValue
              Fn::Sub: ${FoundationStackName}-ApplicationSecurityGroupId
          Subnets: !Split
            - ','
            - !ImportValue
              Fn::Sub: ${FoundationStackName}-PrivateSubnetIds
      LoadBalancers:
        - ContainerName: alo-intake-service
          ContainerPort: 8080
          TargetGroupArn: !Ref IntakeTargetGroup
