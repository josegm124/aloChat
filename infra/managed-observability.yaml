AWSTemplateFormatVersion: '2010-09-09'
Description: aloChat managed observability stack - AMP, AMG, collector service and targeted alarms

Parameters:
  ProjectName:
    Type: String
    Default: alochat
  EnvironmentName:
    Type: String
    Default: dev
  RuntimeClusterName:
    Type: String
  PrivateSubnetIds:
    Type: CommaDelimitedList
  ApplicationSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  HttpApiId:
    Type: String
  LogRetentionDays:
    Type: Number
    Default: 7
  AlertEmail:
    Type: String
    Default: conjguerrero@gmail.com
  ApiLatencyThresholdMs:
    Type: Number
    Default: 3000
  ErrorThreshold:
    Type: Number
    Default: 5
  FailureThreshold:
    Type: Number
    Default: 3
  CollectorImageUri:
    Type: String
    Default: ''
  CollectorCpu:
    Type: Number
    Default: 256
  CollectorMemory:
    Type: Number
    Default: 512
  PrometheusScrapeInterval:
    Type: String
    Default: 30s
  EnableGrafanaWorkspace:
    Type: String
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'

Conditions:
  CreateCollector: !Not [!Equals [!Ref CollectorImageUri, '']]
  CreateGrafanaWorkspace: !Equals [!Ref EnableGrafanaWorkspace, 'true']

Resources:
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub ${ProjectName}-${EnvironmentName}-managed-alerts
      TopicName: !Sub ${ProjectName}-${EnvironmentName}-managed-alerts

  AlertsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref AlertEmail
      Protocol: email
      TopicArn: !Ref AlertsTopic

  ManagedObservabilityLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/alochat/${EnvironmentName}/managed-observability
      RetentionInDays: !Ref LogRetentionDays

  CollectorLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CreateCollector
    Properties:
      LogGroupName: !Sub /aws/alochat/${EnvironmentName}/observability-collector
      RetentionInDays: !Ref LogRetentionDays

  AmpWorkspace:
    Type: AWS::APS::Workspace
    Properties:
      Alias: !Sub ${ProjectName}-${EnvironmentName}
      LoggingConfiguration:
        LogGroupArn: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/alochat/${EnvironmentName}/managed-observability:*

  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Condition: CreateGrafanaWorkspace
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonPrometheusQueryAccess
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-grafana-workspace-role

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Condition: CreateGrafanaWorkspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      DataSources:
        - PROMETHEUS
        - CLOUDWATCH
      Description: !Sub Grafana workspace for ${ProjectName}-${EnvironmentName}
      Name: !Sub ${ProjectName}-${EnvironmentName}
      PermissionType: CUSTOMER_MANAGED
      PluginAdminEnabled: true
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn

  CollectorTaskExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateCollector
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-collector-execution-role

  CollectorTaskRole:
    Type: AWS::IAM::Role
    Condition: CreateCollector
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ProjectName}-${EnvironmentName}-collector-aps
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - aps:RemoteWrite
                Resource: !GetAtt AmpWorkspace.Arn
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-collector-task-role

  CollectorTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Condition: CreateCollector
    Properties:
      Cpu: !Ref CollectorCpu
      ExecutionRoleArn: !GetAtt CollectorTaskExecutionRole.Arn
      Family: !Sub ${ProjectName}-${EnvironmentName}-observability-collector
      Memory: !Ref CollectorMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      TaskRoleArn: !GetAtt CollectorTaskRole.Arn
      ContainerDefinitions:
        - Name: observability-collector
          Image: !Ref CollectorImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 13133
              Protocol: tcp
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: PROJECT_NAME
              Value: !Ref ProjectName
            - Name: ENVIRONMENT_NAME
              Value: !Ref EnvironmentName
            - Name: AMP_REMOTE_WRITE_URL
              Value: !Join
                - ''
                - - !GetAtt AmpWorkspace.PrometheusEndpoint
                  - api/v1/remote_write
            - Name: PROMETHEUS_SCRAPE_INTERVAL
              Value: !Ref PrometheusScrapeInterval
            - Name: INBOUND_ADAPTER_TARGET
              Value: !Sub inbound-adapter.${EnvironmentName}.${ProjectName}.local:8080
            - Name: PROCESSOR_TARGET
              Value: !Sub processor.${EnvironmentName}.${ProjectName}.local:8081
            - Name: AI_ORCHESTRATOR_TARGET
              Value: !Sub ai-orchestrator.${EnvironmentName}.${ProjectName}.local:8083
            - Name: OUTBOUND_DISPATCHER_TARGET
              Value: !Sub outbound-dispatcher.${EnvironmentName}.${ProjectName}.local:8082
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub /aws/alochat/${EnvironmentName}/observability-collector
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  CollectorService:
    Type: AWS::ECS::Service
    Condition: CreateCollector
    Properties:
      Cluster: !Ref RuntimeClusterName
      DesiredCount: 1
      EnableExecuteCommand: true
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref ApplicationSecurityGroupId
          Subnets: !Ref PrivateSubnetIds
      ServiceName: !Sub ${ProjectName}-${EnvironmentName}-observability-collector
      TaskDefinition: !Ref CollectorTaskDefinition

  ApiLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: API Gateway latency higher than expected
      AlarmName: !Sub ${ProjectName}-${EnvironmentName}-api-latency
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 2
      MetricName: Latency
      Namespace: AWS/ApiGateway
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApiId
      Period: 300
      Statistic: Average
      Threshold: !Ref ApiLatencyThresholdMs
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: API Gateway 5xx responses detected
      AlarmName: !Sub ${ProjectName}-${EnvironmentName}-api-5xx
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: 5xx
      Namespace: AWS/ApiGateway
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApiId
      Period: 300
      Statistic: Sum
      Threshold: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  TelegramFailureMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '"Telegram dispatch failed"'
      LogGroupName: !Sub /aws/alochat/${EnvironmentName}/outbound-dispatcher
      MetricTransformations:
        - MetricNamespace: !Sub ${ProjectName}/${EnvironmentName}
          MetricName: telegram-dispatch-failures
          MetricValue: '1'

  TelegramFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Telegram dispatch failures detected
      AlarmName: !Sub ${ProjectName}-${EnvironmentName}-telegram-failures
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: telegram-dispatch-failures
      Namespace: !Sub ${ProjectName}/${EnvironmentName}
      Period: 300
      Statistic: Sum
      Threshold: !Ref FailureThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  OpenSearchFailureMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '"OpenSearch"'
      LogGroupName: !Sub /aws/alochat/${EnvironmentName}/ai-orchestrator
      MetricTransformations:
        - MetricNamespace: !Sub ${ProjectName}/${EnvironmentName}
          MetricName: opensearch-failures
          MetricValue: '1'

  OpenSearchFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: OpenSearch read or write failures detected
      AlarmName: !Sub ${ProjectName}-${EnvironmentName}-opensearch-failures
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: opensearch-failures
      Namespace: !Sub ${ProjectName}/${EnvironmentName}
      Period: 300
      Statistic: Sum
      Threshold: !Ref FailureThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  RedisProcessorFailureMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '"Redis conversation state write failed"'
      LogGroupName: !Sub /aws/alochat/${EnvironmentName}/processor
      MetricTransformations:
        - MetricNamespace: !Sub ${ProjectName}/${EnvironmentName}
          MetricName: redis-processor-failures
          MetricValue: '1'

  RedisProcessorFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Redis write failures in processor detected
      AlarmName: !Sub ${ProjectName}-${EnvironmentName}-redis-processor-failures
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: redis-processor-failures
      Namespace: !Sub ${ProjectName}/${EnvironmentName}
      Period: 300
      Statistic: Sum
      Threshold: !Ref FailureThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  RedisOutboundFailureMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '"Redis conversation state cleanup failed"'
      LogGroupName: !Sub /aws/alochat/${EnvironmentName}/outbound-dispatcher
      MetricTransformations:
        - MetricNamespace: !Sub ${ProjectName}/${EnvironmentName}
          MetricName: redis-outbound-failures
          MetricValue: '1'

  RedisOutboundFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Redis cleanup failures in outbound detected
      AlarmName: !Sub ${ProjectName}-${EnvironmentName}-redis-outbound-failures
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: redis-outbound-failures
      Namespace: !Sub ${ProjectName}/${EnvironmentName}
      Period: 300
      Statistic: Sum
      Threshold: !Ref FailureThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  ProcessorDlqMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '"sending to DLQ"'
      LogGroupName: !Sub /aws/alochat/${EnvironmentName}/processor
      MetricTransformations:
        - MetricNamespace: !Sub ${ProjectName}/${EnvironmentName}
          MetricName: processor-dlq-events
          MetricValue: '1'

  ProcessorDlqAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Processor DLQ events indicate stuck or poisoned messages
      AlarmName: !Sub ${ProjectName}-${EnvironmentName}-processor-dlq
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: processor-dlq-events
      Namespace: !Sub ${ProjectName}/${EnvironmentName}
      Period: 300
      Statistic: Sum
      Threshold: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  AiDlqMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '"sending to DLQ"'
      LogGroupName: !Sub /aws/alochat/${EnvironmentName}/ai-orchestrator
      MetricTransformations:
        - MetricNamespace: !Sub ${ProjectName}/${EnvironmentName}
          MetricName: ai-dlq-events
          MetricValue: '1'

  AiDlqAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: AI DLQ events indicate stuck or poisoned messages
      AlarmName: !Sub ${ProjectName}-${EnvironmentName}-ai-dlq
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: ai-dlq-events
      Namespace: !Sub ${ProjectName}/${EnvironmentName}
      Period: 300
      Statistic: Sum
      Threshold: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  OutboundDlqMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '"sending to DLQ"'
      LogGroupName: !Sub /aws/alochat/${EnvironmentName}/outbound-dispatcher
      MetricTransformations:
        - MetricNamespace: !Sub ${ProjectName}/${EnvironmentName}
          MetricName: outbound-dlq-events
          MetricValue: '1'

  OutboundDlqAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Outbound DLQ events indicate stuck or poisoned messages
      AlarmName: !Sub ${ProjectName}-${EnvironmentName}-outbound-dlq
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: outbound-dlq-events
      Namespace: !Sub ${ProjectName}/${EnvironmentName}
      Period: 300
      Statistic: Sum
      Threshold: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  OpsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${ProjectName}-${EnvironmentName}-managed-observability
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 4,
              "properties": {
                "markdown": "# aloChat ${EnvironmentName} managed observability\nAMP workspace: ${AmpWorkspace}\nGrafana habilitado: ${EnableGrafanaWorkspace}\nLas métricas Prometheus se envían desde el collector ECS hacia AMP."
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 4,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "API Gateway latency",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/ApiGateway", "Latency", "ApiId", "${HttpApiId}" ]
                ],
                "stat": "Average",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 4,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Targeted failures",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "${ProjectName}/${EnvironmentName}", "telegram-dispatch-failures" ],
                  [ ".", "opensearch-failures" ],
                  [ ".", "redis-processor-failures" ],
                  [ ".", "redis-outbound-failures" ]
                ],
                "stat": "Sum",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 10,
              "width": 24,
              "height": 6,
              "properties": {
                "title": "DLQ indicators",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "${ProjectName}/${EnvironmentName}", "processor-dlq-events" ],
                  [ ".", "ai-dlq-events" ],
                  [ ".", "outbound-dlq-events" ]
                ],
                "stat": "Sum",
                "period": 300
              }
            }
          ]
        }

Outputs:
  AlertsTopicArn:
    Value: !Ref AlertsTopic
  AmpWorkspaceArn:
    Value: !GetAtt AmpWorkspace.Arn
  AmpWorkspaceId:
    Value: !GetAtt AmpWorkspace.WorkspaceId
  AmpRemoteWriteUrl:
    Value: !Join
      - ''
      - - !GetAtt AmpWorkspace.PrometheusEndpoint
        - api/v1/remote_write
  GrafanaWorkspaceId:
    Condition: CreateGrafanaWorkspace
    Value: !Ref GrafanaWorkspace
  GrafanaWorkspaceEndpoint:
    Condition: CreateGrafanaWorkspace
    Value: !GetAtt GrafanaWorkspace.Endpoint
  CollectorLogGroupName:
    Condition: CreateCollector
    Value: !Ref CollectorLogGroup
