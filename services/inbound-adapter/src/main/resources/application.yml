spring:
  application:
    name: inbound-adapter
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: localhost:19092
    properties:
      security.protocol: ${ALOCHAT_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${ALOCHAT_KAFKA_SASL_MECHANISM:}
      sasl.jaas.config: ${ALOCHAT_KAFKA_SASL_JAAS_CONFIG:}
      sasl.client.callback.handler.class: ${ALOCHAT_KAFKA_SASL_CALLBACK_HANDLER:}
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        delivery.timeout.ms: 30000
        spring.json.add.type.headers: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

alochat:
  aws:
    region: us-east-1
  inbound:
    default-tenant-id: ${ALOCHAT_INBOUND_DEFAULT_TENANT_ID:acme}
  topics:
    normalized: messages.ingress.normalized
  kafka:
    publish-timeout: 5s
  dynamodb:
    message-audit-table: alochat-dev-message-audit
  web:
    secret-prefix: alochat/dev/tenants
    secret-suffix: ingress-signing-key
    max-clock-skew-seconds: 300
