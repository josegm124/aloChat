spring:
  application:
    name: alo-intake-service
  kafka:
    bootstrap-servers: ${ALO_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

alo:
  kafka:
    resilience:
      consumer:
        max-attempts: ${ALO_KAFKA_RETRY_MAX_ATTEMPTS:3}
        initial-interval-ms: ${ALO_KAFKA_RETRY_INITIAL_INTERVAL_MS:1000}
        multiplier: ${ALO_KAFKA_RETRY_MULTIPLIER:2.0}
        max-interval-ms: ${ALO_KAFKA_RETRY_MAX_INTERVAL_MS:10000}
        dlq-topic: ${ALO_KAFKA_DLQ_TOPIC:alo.dlq}
      producer:
        circuit-breaker-name: ${ALO_KAFKA_CB_NAME:kafkaPublisher}
        send-timeout-ms: ${ALO_KAFKA_PUBLISH_TIMEOUT_MS:5000}
        open-state-wait-ms: ${ALO_KAFKA_CB_OPEN_WAIT_MS:10000}
        failure-rate-threshold: ${ALO_KAFKA_CB_FAILURE_RATE_THRESHOLD:50}
  dynamodb:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${ALO_DYNAMODB_ENDPOINT:}
    tables:
      assessments: ${ALO_DYNAMODB_ASSESSMENTS_TABLE:alo-assessments}
      submissions: ${ALO_DYNAMODB_SUBMISSIONS_TABLE:alo-submissions}
      idempotency: ${ALO_DYNAMODB_IDEMPOTENCY_TABLE:alo-idempotency}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
