spring:
  application:
    name: ai-orchestrator
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: localhost:19092
    properties:
      security.protocol: ${ALOCHAT_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${ALOCHAT_KAFKA_SASL_MECHANISM:}
      sasl.jaas.config: ${ALOCHAT_KAFKA_SASL_JAAS_CONFIG:}
      sasl.client.callback.handler.class: ${ALOCHAT_KAFKA_SASL_CALLBACK_HANDLER:}
    consumer:
      group-id: alochat-ai-orchestrator-v1
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.alochat.contracts.message
        spring.json.value.default.type: com.alochat.contracts.message.MessageEnvelope
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        delivery.timeout.ms: 30000
        spring.json.add.type.headers: false
    listener:
      ack-mode: record

server:
  port: 8083
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

alochat:
  aws:
    region: us-east-1
  topics:
    ai: messages.processing.ai
    outbound: messages.outbound.dispatch
    retry-short: messages.retry.short
    retry-long: messages.retry.long
    dlq: messages.dlq
  dynamodb:
    message-audit-table: alochat-dev-message-audit
    conversation-memory-table: alochat-dev-conversation-memory
    campaign-hint-table: alochat-dev-campaign-hints
  ai:
    knowledge:
      catalog-resource: classpath:knowledge/store_inventory_2026.psv
      snippet-limit: 3
    opensearch:
      endpoint: ""
      knowledge-index: kb_corpus
      memory-index: chat_memory
    bedrock:
      embedding-model-id: amazon.titan-embed-text-v2:0
  kafka:
    retry-groups:
      short: alochat-ai-retry-short-v1
      long: alochat-ai-retry-long-v1
    retry-delay:
      short-ms: 2000
      long-ms: 10000
  campaigns:
    enabled: true
    poll-interval-ms: 300000
    initial-delay-ms: 60000
