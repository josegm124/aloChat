spring:
  application:
    name: alo-report-service
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: ${ALO_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: alo-report-service
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.alo.contracts.events,com.alo.contracts.assessment"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

alo:
  report:
    storage:
      bucket: ${ALO_REPORTS_BUCKET:}
      public-base-url: ${ALO_PUBLIC_BASE_URL:http://localhost:8086}
      endpoint: ${ALO_REPORT_STORAGE_ENDPOINT:}
      access-key: ${ALO_REPORT_STORAGE_ACCESS_KEY:}
      secret-key: ${ALO_REPORT_STORAGE_SECRET_KEY:}
      path-style-enabled: ${ALO_REPORT_STORAGE_PATH_STYLE_ENABLED:false}
  kafka:
    resilience:
      consumer:
        max-attempts: ${ALO_KAFKA_RETRY_MAX_ATTEMPTS:3}
        initial-interval-ms: ${ALO_KAFKA_RETRY_INITIAL_INTERVAL_MS:1000}
        multiplier: ${ALO_KAFKA_RETRY_MULTIPLIER:2.0}
        max-interval-ms: ${ALO_KAFKA_RETRY_MAX_INTERVAL_MS:10000}
        dlq-topic: ${ALO_KAFKA_DLQ_TOPIC:alo.dlq}
      producer:
        circuit-breaker-name: ${ALO_KAFKA_CB_NAME:kafkaPublisher}
        send-timeout-ms: ${ALO_KAFKA_PUBLISH_TIMEOUT_MS:5000}
        open-state-wait-ms: ${ALO_KAFKA_CB_OPEN_WAIT_MS:10000}
        failure-rate-threshold: ${ALO_KAFKA_CB_FAILURE_RATE_THRESHOLD:50}
    topics:
      assessment-report-requested: alo.assessment.report.requested

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
