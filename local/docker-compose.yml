services:
  redpanda:
    image: redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "19092:19092"
      - "9644:9644"

  redpanda-init:
    image: redpandadata/redpanda:v24.3.5
    depends_on:
      - redpanda
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until rpk cluster info --brokers redpanda:9092 >/dev/null 2>&1; do
          sleep 2
        done
        rpk topic create alo.assessment.intake.received --brokers redpanda:9092 || true
        rpk topic create alo.assessment.profile.resolved --brokers redpanda:9092 || true
        rpk topic create alo.assessment.document.requested --brokers redpanda:9092 || true
        rpk topic create alo.assessment.dataset.requested --brokers redpanda:9092 || true
        rpk topic create alo.assessment.document.completed --brokers redpanda:9092 || true
        rpk topic create alo.assessment.dataset.completed --brokers redpanda:9092 || true
        rpk topic create alo.assessment.report.requested --brokers redpanda:9092 || true
        rpk topic create alo.assessment.notification.requested --brokers redpanda:9092 || true
        rpk topic create alo.assessment.notification.completed --brokers redpanda:9092 || true
        rpk topic create alo.retry.short --brokers redpanda:9092 || true
        rpk topic create alo.retry.long --brokers redpanda:9092 || true
        rpk topic create alo.dlq --brokers redpanda:9092 || true

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    command:
      - -jar
      - DynamoDBLocal.jar
      - -sharedDb
      - -inMemory
    ports:
      - "8000:8000"

  dynamodb-init:
    image: amazon/aws-cli:2.17.47
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1; do
          sleep 2
        done
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name alo-assessments \
          --attribute-definitions AttributeName=assessmentId,AttributeType=S \
          --key-schema AttributeName=assessmentId,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST || true
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name alo-submissions \
          --attribute-definitions AttributeName=submissionId,AttributeType=S \
          --key-schema AttributeName=submissionId,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST || true
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name alo-idempotency \
          --attribute-definitions AttributeName=idempotencyKey,AttributeType=S \
          --key-schema AttributeName=idempotencyKey,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST || true

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do
          sleep 2
        done
        mc mb --ignore-existing local/alo-uploads
        mc mb --ignore-existing local/alo-reports

  alo-intake-service:
    build:
      context: ..
      dockerfile: docker/service.Dockerfile
      args:
        JAR_FILE: services/alo-intake-service/build/libs/alo-intake-service-0.1.0-SNAPSHOT.jar
    depends_on:
      - redpanda
      - dynamodb-local
    environment:
      ALO_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      ALO_DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx192m -XX:+UseSerialGC
    ports:
      - "8080:8080"

  alo-document-compliance-service:
    build:
      context: ..
      dockerfile: docker/service.Dockerfile
      args:
        JAR_FILE: services/alo-document-compliance-service/build/libs/alo-document-compliance-service-0.1.0-SNAPSHOT.jar
    depends_on:
      - redpanda
    environment:
      ALO_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      ALO_SEARCH_ENABLED: "false"
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx192m -XX:+UseSerialGC
    ports:
      - "8082:8082"

  alo-report-service:
    build:
      context: ..
      dockerfile: docker/service.Dockerfile
      args:
        JAR_FILE: services/alo-report-service/build/libs/alo-report-service-0.1.0-SNAPSHOT.jar
    depends_on:
      - redpanda
      - minio
    environment:
      ALO_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      ALO_REPORTS_BUCKET: alo-reports
      ALO_REPORT_STORAGE_ENDPOINT: http://minio:9000
      ALO_REPORT_STORAGE_ACCESS_KEY: minioadmin
      ALO_REPORT_STORAGE_SECRET_KEY: minioadmin
      ALO_REPORT_STORAGE_PATH_STYLE_ENABLED: "true"
      ALO_PUBLIC_BASE_URL: http://localhost:8086
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx192m -XX:+UseSerialGC
    ports:
      - "8086:8086"

  alo-notification-service:
    build:
      context: ..
      dockerfile: docker/service.Dockerfile
      args:
        JAR_FILE: services/alo-notification-service/build/libs/alo-notification-service-0.1.0-SNAPSHOT.jar
    depends_on:
      - redpanda
    environment:
      ALO_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      ALO_NOTIFICATION_MODE: disabled
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx192m -XX:+UseSerialGC
    ports:
      - "8087:8087"
